<!DOCTYPE html>
<html>
<head>
<title>1 Year Friendship 💖</title>
<style>
body{
font-family:Arial,sans-serif;
text-align:center;
background:#ffe6f2;
padding:30px;
}
.box{
background:white;
padding:20px;
border-radius:15px;
max-width:500px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}
button{
padding:10px 20px;
font-size:18px;
border:none;
border-radius:10px;
background:pink;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h1>🎉 Happy 1 Year! 🎉</h1>

<p id="message">
Click the button to reveal a surprise ❤️
</p>

<button onclick="showSurprise()">
Open Surprise
</button>
</div>

<script>
function showSurprise(){
document.getElementById("message").innerHTML =
"💖 365 days, countless memories, and many more to come! Thank you for being such an amazing friend. Happy Anniversary! 💖";
}
</script>

</body>
</html>
